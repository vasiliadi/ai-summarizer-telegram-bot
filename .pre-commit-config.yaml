repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: \.py$
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.19
    hooks:
      - id: uv-lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^src/
      - id: ruff-format
        files: ^src/

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uvx ty check .
        language: system
        pass_filenames: false
        files: ^src/
      - id: pytest
        name: pytest
        entry: uv run pytest --cov
        language: system
        pass_filenames: false
        always_run: false
        files: ^(src|tests)/

  - repo: local
    hooks:
      - id: uv-sync
        name: uv-sync
        entry: uv sync
        language: system
        stages: [post-merge, post-checkout, post-rewrite]
        always_run: true
        pass_filenames: false
