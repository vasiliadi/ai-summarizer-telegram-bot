name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ruff check
        uses: astral-sh/ruff-action@v3
        with:
          args: "check src/"

      - name: Run ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check src/"
